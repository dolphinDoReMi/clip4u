# Local Postgres for real UI/API E2E (Playwright + Vitest DB tests).
# Usage: docker compose up -d
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: mirachat
      POSTGRES_PASSWORD: mirachat
      POSTGRES_DB: mirachat
    ports:
      - '55432:5432'
    volumes:
      - mirachat_pg:/var/lib/postgresql/data

volumes:
  mirachat_pg:
